name: SupplyChain360 CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: Create dbt profiles.yml
        run: |
          mkdir -p dbt/supplychain360_dbt
          cat > dbt/supplychain360_dbt/profiles.yml << EOF
          supplychain360_dbt:
            outputs:
              dev:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: ACCOUNTADMIN
                database: supplychain360_db
                warehouse: supplychain360_wh
                schema: raw
                threads: 4
            target: dev
          EOF

      - name: Run dbt tests
        run: |
          cd dbt/supplychain360_dbt
          dbt test --profiles-dir .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.ingestion
          push: true
          tags: |
            feyiarmstrong/supplychain360-ingestion:latest
            feyiarmstrong/supplychain360-ingestion:${{ github.sha }}