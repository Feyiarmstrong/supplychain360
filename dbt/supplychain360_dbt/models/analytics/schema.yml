version: 2

models:
  - name: dim_products
    description: "Product dimension table enriched with supplier info"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: product_name
        tests:
          - not_null
      - name: category
        tests:
          - not_null

  - name: dim_suppliers
    description: "Supplier dimension table"
    columns:
      - name: supplier_id
        tests:
          - unique
          - not_null
      - name: supplier_name
        tests:
          - not_null

  - name: dim_warehouses
    description: "Warehouse dimension table"
    columns:
      - name: warehouse_id
        tests:
          - unique
          - not_null

  - name: dim_stores
    description: "Store dimension table"
    columns:
      - name: store_id
        tests:
          - unique
          - not_null
      - name: store_name
        tests:
          - not_null
      - name: region
        tests:
          - not_null

  - name: fct_sales
    description: "Sales fact table with 1.4M transactions"
    columns:
      - name: transaction_id
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: store_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_stores')
              field: store_id
      - name: sale_amount
        tests:
          - not_null

  - name: fct_shipments
    description: "Shipments fact table"
    columns:
      - name: shipment_id
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: delivery_status
        tests:
          - not_null
          - accepted_values:
              values: ['On Time', 'Slightly Late', 'Late']

  - name: fct_inventory
    description: "Inventory fact table with reorder flags"
    columns:
      - name: product_id
        tests:
          - not_null
      - name: warehouse_id
        tests:
          - not_null
      - name: quantity_available
        tests:
          - not_null
      - name: needs_reorder
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
              